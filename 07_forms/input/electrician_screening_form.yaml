title: Анкета электрика-монтажника
description: |
  Здравствуйте. Спасибо за интерес к сотрудничеству.

  Мы подбираем электриков для монтажа резервного питания и ИБП на объектах клиентов в Краснодарском крае. Чтобы быстро понять, подходим ли мы друг другу, просим заполнить короткую анкету.

  Базовые условия:

  - формат работы: самозанятый или ИП;
  - обычно два выезда на объект: осмотр и подтверждение ТЗ, затем монтаж и запуск;
  - первый выезд включает осмотр, замеры, фотофиксацию и сверку ТЗ/КП;
  - стоимость первого выезда согласуем заранее;
  - монтаж выполняется по нашему ТЗ с удаленным инженерным сопровождением;
  - вознаграждение за монтаж обычно составляет от 10 000 руб. за объект и может быть выше при сложном монтаже;
  - подготовительные работы часто требуются отдельно; их объем и стоимость электрик согласует с клиентом, клиент оплачивает эти работы напрямую электрику;
  - после работ нужен фотоотчет;
  - запуск и приемка проходят с удаленным инженерным контролем.

  Перед отправкой анкеты ознакомьтесь с документами:

  [Политика конфиденциальности](https://sveton-ibp.ru/policy/)
  [Согласие на обработку персональных данных](https://sveton-ibp.ru/personal-policy/)

  Отправляя анкету, вы подтверждаете согласие на обработку персональных данных для рассмотрения отклика и связи по сотрудничеству.

  Анкета занимает 3-5 минут.
