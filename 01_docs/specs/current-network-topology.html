      background: #f5f8fb;

      padding: 12px;

    #sveton-current-network-topology svg {
      display: block;
      width: 100%;
      height: auto;

    #sveton-current-network-topology .zone {
      stroke-width: 2;
      rx: 18;
    }

    #sveton-current-network-topology .zone-title {
      font-size: 25px;
      font-weight: 800;
      fill: #334a63;
    }

    #sveton-current-network-topology .node {
      fill: var(--card);
      stroke: var(--card-border);
      stroke-width: 2;
      rx: 13;
    }

    #sveton-current-network-topology .strong-node {
      fill: var(--strong);
      stroke: #91c1dd;
      stroke-width: 2;
      rx: 13;
    }

    #sveton-current-network-topology .muted-node {
      fill: #f2f5f9;
      stroke: #d2dce8;
      stroke-width: 2;
      rx: 10;
    }

    #sveton-current-network-topology .title {
      font-size: 24px;
      font-weight: 800;
      fill: var(--ink);
    }

    #sveton-current-network-topology .body {
      font-size: 18px;
      font-weight: 600;
      fill: var(--muted);
    }

    #sveton-current-network-topology .small {
      font-size: 16px;
      font-weight: 600;
      fill: var(--muted);
    }

    #sveton-current-network-topology .label {
      font-size: 15px;
      font-weight: 800;
      fill: #5c6e84;
    }

    #sveton-current-network-topology .badge {
      fill: #edf7ff;
      stroke: #c3def5;
      stroke-width: 1.5;
      rx: 18;
    }

    #sveton-current-network-topology .badge-text {
      font-size: 17px;
      fill: #2c75c7;
      font-weight: 800;
    }

    #sveton-current-network-topology .arrow {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.6;
      marker-end: url(#arrow-gray);
    }

    #sveton-current-network-topology .line {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.6;
    }

    #sveton-current-network-topology .arrow-awg {
      fill: none;
      stroke: var(--awg);
      stroke-width: 4;
      marker-end: url(#arrow-awg);
    }

    #sveton-current-network-topology .arrow-tail {
      fill: none;
      stroke: var(--tail);
      stroke-width: 2.8;
      stroke-dasharray: 10 9;
      marker-end: url(#arrow-gray);
    }

    #sveton-current-network-topology .arrow-db {
      fill: none;
      stroke: var(--red);
      stroke-width: 3;
      stroke-dasharray: 8 8;
      marker-end: url(#arrow-red);
    }

    #sveton-current-network-topology .arrow-sso {
      fill: none;
      stroke: var(--violet);
      stroke-width: 3;
      stroke-dasharray: 7 7;
      marker-end: url(#arrow-violet);
