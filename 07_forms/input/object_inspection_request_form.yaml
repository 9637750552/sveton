title: Заявка на осмотр объекта
description: |
  Рабочий YAML-шаблон, синхронизированный с v2-редакцией приложения №1 к договору на осмотр.

  Структура шаблона повторяет новый markdown-текст:
  часть A - заявка до выезда;
  часть B - отчет по выполнению заявки.

  Там, где бумажная версия использует строки для ручного заполнения, в форме применены короткие поля, чек-листы и многострочные поля для структурированного ввода.
isAnonymous: false
submitMultiple: false
allowEditSubmissions: false
showExpiration: false
submitText: Сохранить заявку
thanksTitle: Заявка сохранена
submissionMessage: Данные по заявке и осмотру сохранены.

source:
  document: 01_docs/operations/contracts/appendix_1_object_inspection_request_v2.md
  appendix: Приложение N 1
  note: YAML приведен в прямое соответствие с v2-редакцией приложения №1.

nextcloudForms:
  baseUrl: https://nc.domibp.ru

manualSettings:
  yandexForms:
    - Проверить обязательность вопросов перед публикацией: текущий API-скрипт Yandex Forms предупреждает, что required-флаги нужно проверить вручную.
    - Проверить визуальную читаемость длинных секций Часть A и Часть B в интерфейсе формы.
  nextcloudForms:
    - Проверить, что длинные названия секций читаются нормально на мобильном экране.
    - Проверить удобство загрузки нескольких файлов в блоке материалов отчета.

