    note: '3 балла: выбраны пункты про бюджет, окупаемость, неясные условия, сложность проекта, различие между резервом и
      экономией.'
    points: 3
  - question: q21_market_reason
    note: '2 балла: выбраны практические рыночные причины, а не лозунги.'
    points: 2
