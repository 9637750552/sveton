title: "Анкета первичного отбора электриков-монтажников"
description: |
  Спасибо за отклик.

  Чтобы не тратить ваше и наше время на длинный первый звонок, просим заполнить короткую анкету.
  Мы ищем электриков под монтаж резервного питания и ИБП на объектах клиентов в Краснодарском крае.
  Работа идет по техническому заданию, с фотоотчетом и удаленной проверкой инженером.

  Анкета занимает 5-7 минут.
isAnonymous: false
submitMultiple: false
allowEditSubmissions: false
showExpiration: false
submissionMessage: "Спасибо. После ответов выберем кандидатов для созвона."

questions:
  - text: "Ваше имя."
    type: "short"
    isRequired: true

  - text: "Телефон / WhatsApp / Telegram."
    type: "short"
    isRequired: true

  - text: "В каком городе вы находитесь?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Краснодар"
      - "Горячий Ключ"
      - "Анапа"
      - "Геленджик"
      - "Новороссийск"
      - "Туапсе / Джубга"
      - "Сочи"
      - "Другой город Краснодарского края"
      - "Не Краснодарский край"

  - text: "В какие районы готовы выезжать?"
    type: "multiple"
    isRequired: true
    options:
      - "Только свой город"
      - "По соседним районам"
      - "По большей части края"
      - "Краснодар"
      - "Горячий Ключ"
      - "Анапа"
      - "Геленджик"
      - "Новороссийск"
      - "Туапсе / Джубга"
      - "Сочи"

  - text: "Как быстро обычно можете выехать на осмотр или монтаж?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "В день обращения"
      - "На следующий день"
      - "В течение 2-3 дней"
      - "Обычно нужно 4-7 дней"
      - "Только по записи заранее"

  - text: "В каком формате готовы работать?"
    type: "multiple"
    isRequired: true
    options:
      - "Самозанятый"
      - "ИП"
      - "Договор ГПХ"
      - "Перевод физлицу"
      - "Наличные"

  - text: "Есть ли у вас свой автомобиль?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да, постоянно на выезде"
      - "Иногда есть доступ к автомобилю"
      - "Нет"

  - text: "Есть ли у вас свой инструмент для работы со щитами и монтажом?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да, полный комплект"
      - "Есть основной комплект, часть докупаю под задачу"
      - "Минимальный набор"
      - "Нет своего комплекта"

  - text: "Сколько лет занимаетесь электромонтажом?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Меньше 1 года"
      - "1-3 года"
      - "3-5 лет"
      - "Более 5 лет"

  - text: "На каких объектах у вас больше всего опыта?"
    type: "multiple"
    isRequired: true
    options:
      - "Квартиры"
      - "Частные дома"
      - "Котельные"
      - "Коммерческие помещения"
      - "Распределительные щиты"
      - "Промышленные объекты"

  - text: "Какой у вас опыт работы с распределительными щитами?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Регулярно собираю и дорабатываю щиты"
      - "Иногда собираю или дорабатываю"
      - "Обычно только подключаю готовые щиты"
      - "С щитами почти не работаю"

  - text: "С каким оборудованием у вас уже был практический опыт?"
    type: "multiple"
    isRequired: true
    options:
      - "ИБП"
      - "Инверторы"
      - "Аккумуляторные батареи"
      - "Генераторы"
      - "Стабилизаторы"
      - "АВР / ручной ввод резерва"
      - "Байпас"
      - "Ничего из перечисленного"

  - text: "Работали ли вы с частными домами на трехфазном вводе?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да, регулярно"
      - "Несколько раз"
      - "Только однофазные объекты"
      - "Нет такого опыта"

  - text: "Что вы обычно проверяете на первом выезде перед подтверждением монтажа резервного питания?"
    type: "multiple"
    isRequired: true
    options:
      - "Состояние и состав щита"
      - "Какие нагрузки клиент хочет резервировать"
      - "Количество фаз и распределение нагрузок"
      - "Место установки ИБП и АКБ"
      - "Возможную трассу кабеля"
      - "Наличие места под дополнительные автоматы и элементы"
      - "Сразу предлагаю подключить весь дом в резерв без расчета"
      - "Подробно ничего не проверяю, решаю уже при монтаже"

  - text: "Если в доме три фазы, а клиент хочет резервировать только часть нагрузок, какой подход вам ближе?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Сначала определить, какие нагрузки на каких фазах, и резервировать только согласованные группы по схеме"
      - "Обычно перевожу все нужное на одну фазу без дополнительных согласований"
      - "Соединяю фазы по месту, если так быстрее"
      - "Не работаю с такими задачами"

  - text: "Для чего в такой системе нужен байпас?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Чтобы можно было безопасно обслуживать или отключать ИБП без самодельных перемычек"
      - "Чтобы увеличить емкость аккумуляторов"
      - "Чтобы инвертор работал тише"
      - "Не вижу смысла в байпасе"

  - text: "Что из этого нельзя обещать клиенту без отдельного расчета и проверки схемы?"
    type: "multiple"
    isRequired: true
    options:
      - "Электроплита"
      - "Мощный скважинный насос"
      - "Кондиционеры"
      - "Сауна / электрокотел"
      - "Газовый котел"
      - "Интернет-роутер"
      - "Насос отопления"
      - "Холодильник"

  - text: "Если реальный щит на объекте не совпадает с выданным ТЗ или схемой, что вы делаете?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Останавливаюсь, фиксирую расхождения, отправляю фото и согласовываю изменения"
      - "По возможности решаю сам и потом сообщаю по факту"
      - "Делаю по месту, как считаю правильным"
      - "Обычно не обращаю внимания на такие расхождения"

  - text: "Готовы ли вы работать по схеме и ТЗ, которые присылает инженер?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да"
      - "Да, если при расхождении сначала согласовываем изменения"
      - "Предпочитаю работать по своему подходу"

  - text: "Какие материалы вы готовы отправлять до первого включения системы?"
    type: "multiple"
    isRequired: true
    options:
      - "Фото щита до начала работ"
      - "Фото подключений и клемм"
      - "Фото маркировки автоматов и кабелей"
      - "Фото общего вида собранной системы"
      - "Видео или фото настроек инвертора"
      - "Ничего из этого не отправляю"

  - text: "Когда, по-вашему, можно включать систему после монтажа?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "После моей собственной проверки и после удаленной проверки инженером, если такой порядок задан"
      - "Сразу после моей собственной проверки, без ожидания инженера"
      - "Когда клиент скажет включать"
      - "По ситуации, четкого правила нет"

  - text: "Готовы ли вы делать фотоотчет до и после работ?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да, это нормальная часть работы"
      - "Да, если список фото заранее понятен"
      - "Только выборочно"
      - "Нет, не хочу тратить на это время"

  - text: "Чем реально пользуетесь в работе?"
    type: "multiple"
    isRequired: true
    options:
      - "Мультиметр"
      - "Токовые клещи"
      - "Индикатор напряжения"
      - "Пресс-клещи для наконечников"
      - "Инструмент для зачистки кабеля"
      - "Динамометрическая отвертка"
      - "НШВИ / ТМЛ и работа с наконечниками"
      - "Ничего из перечисленного"

  - text: "Можете ли вы прислать 3-5 фото своих прошлых щитов или монтажей?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да, приложу сразу к анкете"
      - "Да, отправлю в мессенджер после анкеты"
      - "Смогу прислать позже по запросу"
      - "Нет"

  - text: "Стоимость выезда на осмотр / замер:"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Бесплатно при дальнейшем монтаже"
      - "До 2 000 руб."
      - "2 000-4 000 руб."
      - "Более 4 000 руб."
      - "Обсуждаю отдельно по каждому объекту"

  - text: "Как вам удобнее оценивать стоимость работ?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "По понятному фиксированному объему работ"
      - "По осмотру и ТЗ"
      - "По дням работы"
      - "Только после личного выезда и своего расчета"

  - text: "Есть ли у вас сейчас время на первые объекты?"
    type: "multiple_unique"
    isRequired: true
    options:
      - "Да, готов брать объекты в ближайшее время"
      - "Частично, зависит от даты"
      - "Сейчас загружен, но позже возможно"
      - "Пока не готов"

  - text: "Дополнительный комментарий."
    type: "short"
    isRequired: false
