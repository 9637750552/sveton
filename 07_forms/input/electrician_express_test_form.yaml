title: Экспресс-тест электрика-монтажника
description: |
  Здравствуйте. Это короткий экспресс-тест по задачам резервного питания и ИБП.

  Он нужен после первичной анкеты, чтобы понять ваш ход мысли на типовых объектах.

  В каждом вопросе выберите не более 3 вариантов ответа.

  Перед отправкой теста ознакомьтесь с документами:

  [Политика конфиденциальности](https://sveton-ibp.ru/policy/)
  [Согласие на обработку персональных данных](https://sveton-ibp.ru/personal-policy/)

  Отправляя тест, вы подтверждаете согласие на обработку персональных данных для рассмотрения отклика и связи по сотрудничеству.
isAnonymous: false
submitMultiple: false
allowEditSubmissions: false
showExpiration: false
submitText: Отправить
thanksTitle: Спасибо за ответы
submissionMessage: Спасибо. Мы посмотрим ответы и вернемся с дальнейшими шагами.
