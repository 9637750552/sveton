  - question: q14_inrush_loads
    note: '2 балла: выбраны моторные нагрузки без бытовых легких линий как главного ответа.'
    points: 2
  - question: q15_inrush_measurement
    note: '3 балла: выбраны токовые клещи, паспортные данные, сценарий одновременного старта или запас по рискам.'
    points: 3
  - question: q16_inrush_decision
    note: '3 балла: выбраны сравнение пусковой картины, одновременности и границ решения.'
    points: 3
  - question: q17_ups_vs_generator
    note: '2 балла: выбраны два-три сильных сценария без варианта про большие нагрузки и без явного лозунга.'
    points: 2
  - question: q18_generator_fit
    note: '2 балла: выбраны сценарии про долгие отключения, большие нагрузки, размещение и обслуживание.'
    points: 2
  - question: q19_solar_first_clarify
    note: '3 балла: выбраны пункты про цель клиента, бюджет, профиль потребления, отдельный пересчет.'
    points: 3
