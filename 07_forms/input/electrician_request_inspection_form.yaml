title: Заявка на осмотр объекта монтажником
description: |
  Рабочий вопросник для монтажника при осмотре объекта.

  Заполните форму на объекте или сразу после осмотра. Цель формы - передать в Светон фактическую картину объекта: что проверено, какие нагрузки клиент хочет резервировать, что видно по щиту, месту установки, трассе, ограничениям и фото/видео.

  Важно:

  - монтажник проверяет объект, делает замеры, фото и видео, фиксирует расхождения и фактические замечания;
  - расчет, КП, итоговый Перечень работ и обещания клиенту остаются в зоне Светон;
  - если действие небезопасно, невозможно, выходит за пределы Заявки или требует согласования, остановитесь и сообщите в Светон.
isAnonymous: false
submitMultiple: true
allowEditSubmissions: false
showExpiration: false
submitText: Отправить Заявку
thanksTitle: Заявка отправлена
submissionMessage: Спасибо. Материалы осмотра переданы в Светон.
source:
  document: C:/Users/serge/Nextcloud2/Компания/Договора/Черновики/electrician_partner_request_zayavka_draft.md
  versionDate: '2026-07-06'
  note: Онлайн-форма Nextcloud Forms по черновику приложения Заявка; бумажные таблицы преобразованы в вопросы формы.
generatedForms: []
manualSettings:
  nextcloudForms:
  - После создания формы проверить порядок секций и визуальное разделение блоков в редакторе Nextcloud Forms.
  - В файловом поле q47_upload_materials разрешить загрузку нескольких фото и видео, если настройка доступна в текущей версии Nextcloud Forms.
  - При необходимости добавить форму в рабочую папку объекта или в шаблон процесса первого выезда.
nextcloudForms:
  baseUrl: https://nc.domibp.ru
